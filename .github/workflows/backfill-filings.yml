name: Backfill SEC Filings

on:
  workflow_dispatch:
    inputs:
      backfill_days:
        description: Number of calendar days to scan for backfill
        required: true
        default: "3"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backfill SEC filings
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          ENABLE_EMAIL_ALERTS: false
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          OPENARENA_BASE_URL: https://aiopenarena.thomsonreuters.com
          OPENARENA_BEARER_TOKEN: ${{ secrets.OPENARENA_BEARER_TOKEN }}
          OPENARENA_WORKFLOW_ID: 9214a226-9866-4f29-abd3-0eb3cd235f8e
          OPENARENA_TIMEOUT_SECONDS: 180
        run: python scripts/poll_filings.py --days ${{ inputs.backfill_days }} --forms 8-K,D --max-results 200 --quiet

      - name: Commit backfill data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/alerts.json data/state.json data/status.json
          git diff --cached --quiet || git commit -m "Backfill filing dashboard data"
          git push
